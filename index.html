<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>할 일 관리</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1 class="app-title">할 일 관리</h1>
        <p class="app-subtitle">오늘의 할 일을 한눈에 보고, 쉽게 추가하세요.</p>
      </header>

      <main class="app-main">
        <section class="card today-card">
          <div class="section-header">
            <h2>오늘의 할 일</h2>
            <div class="date-selector">
              <span
                id="today-date-label"
                class="date-pill"
                role="button"
                aria-label="날짜 선택"
              ></span>
              <input
                id="filter-date-input"
                type="date"
                class="visually-hidden-date-input"
              />
            </div>
          </div>
          <div id="today-tasks-container" class="task-list today-list">
            <!-- 선택한 날짜의 할 일이 렌더링됩니다. -->
          </div>
        </section>

        <section class="view-toggle">
          <button
            id="list-view-button"
            class="secondary-button view-toggle-button is-active"
            type="button"
          >
            목록으로 보기
          </button>
          <button
            id="calendar-view-button"
            class="secondary-button view-toggle-button"
            type="button"
          >
            달력으로 보기
          </button>
        </section>

        <section class="toolbar">
          <button id="open-modal-button" class="primary-button">
            + 새 할 일 추가
          </button>
        </section>

        <section class="card all-tasks-card">
          <div class="section-header">
            <h2>할 일 전체 보기</h2>
            <div class="month-nav">
              <button id="prev-month-button" class="secondary-button month-nav-button" type="button">
                이전달
              </button>
              <span id="calendar-month-label" class="month-label"></span>
              <button id="next-month-button" class="secondary-button month-nav-button" type="button">
                다음달
              </button>
            </div>
          </div>
          <div id="all-tasks-container" class="task-list">
            <!-- 선택한 달의 전체 할 일이 목록으로 렌더링됩니다. -->
          </div>
          <div id="calendar-container" class="calendar-container" hidden>
            <!-- 달력 형태로 할 일이 렌더링됩니다. -->
          </div>
        </section>
      </main>
    </div>

    <!-- 새 할 일 추가 모달 -->
    <div id="task-modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header class="modal-header">
          <h2 id="modal-title">새 할 일 추가</h2>
        </header>
        <form id="task-form" class="modal-body">
          <div class="form-field">
            <label for="task-title">제목</label>
            <input
              id="task-title"
              name="title"
              type="text"
              placeholder="예: 운동하기, 보고서 작성하기"
              required
            />
          </div>

          <div class="form-field">
            <label for="task-detail">상세 내용</label>
            <textarea
              id="task-detail"
              name="detail"
              rows="3"
              placeholder="해야 할 일에 대한 간단한 설명을 적어주세요."
            ></textarea>
          </div>

          <div class="form-field">
            <label for="task-date">일자</label>
            <input id="task-date" name="date" type="date" required />
          </div>

          <div class="form-field">
            <label for="task-time">시간</label>
            <div class="time-input-wrapper">
              <input
                id="task-time"
                name="time"
                type="number"
                min="0"
                max="24"
                placeholder="0~24"
                required
              />
              <span class="time-suffix">시</span>
            </div>
          </div>

          <footer class="modal-footer">
            <button type="button" id="cancel-modal-button" class="secondary-button">
              취소
            </button>
            <button type="submit" class="primary-button">추가하기</button>
          </footer>
        </form>
      </div>
    </div>

    <!-- 할 일 상세 보기 모달 -->
    <div id="task-detail-overlay" class="modal-overlay" aria-hidden="true">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="detail-modal-title"
      >
        <header class="modal-header">
          <!-- 여기에는 선택한 할 일의 날짜가 표시됩니다. -->
          <h2 id="detail-modal-title"></h2>
        </header>
        <div class="modal-body detail-modal-body">
          <div id="detail-view" class="detail-view">
            <div class="detail-header">
              <div id="detail-title" class="detail-title"></div>
            </div>
            <div id="detail-body" class="detail-body"></div>
          </div>
          <form id="detail-edit-form" class="detail-edit-form" hidden>
            <div class="form-field">
              <label for="edit-task-title">제목</label>
              <input id="edit-task-title" name="title" type="text" required />
            </div>
            <div class="form-field">
              <label for="edit-task-detail">상세 내용</label>
              <textarea id="edit-task-detail" name="detail" rows="3"></textarea>
            </div>
            <div class="form-field">
              <label for="edit-task-date">일자</label>
              <input id="edit-task-date" name="date" type="date" required />
            </div>
            <div class="form-field">
              <label for="edit-task-time">시간</label>
              <div class="time-input-wrapper">
                <input
                  id="edit-task-time"
                  name="time"
                  type="number"
                  min="0"
                  max="24"
                  placeholder="0~24"
                  required
                />
                <span class="time-suffix">시</span>
              </div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="primary-button">저장</button>
            </div>
          </form>
          <footer class="modal-footer detail-modal-footer">
            <button type="button" id="edit-detail-button" class="secondary-button">
              상세 정보 편집
            </button>
            <button type="button" id="toggle-complete-button" class="secondary-button">
              완료하기
            </button>
            <button type="button" id="close-detail-button" class="primary-button">
              닫기
            </button>
          </footer>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
